<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>星焰重卡机甲变形演示</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23090b10'/%3E%3Cpath d='M10 41h44l-7 10H17z' fill='%23b91c1c'/%3E%3Cpath d='M15 19h22l12 12v10H9V27z' fill='%231d4ed8'/%3E%3Cpath d='M19 25h15l8 8H17z' fill='%23f8fafc'/%3E%3Ccircle cx='20' cy='45' r='5' fill='%23d7dde5'/%3E%3Ccircle cx='44' cy='45' r='5' fill='%23d7dde5'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app">
      <canvas id="scene" aria-label="星焰重卡机甲 3D 变形演示"></canvas>

      <header class="hud top-hud">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <div>
            <h1>星焰重卡机甲</h1>
            <p>红蓝半挂车 · 人形机甲变形演示</p>
          </div>
        </div>
        <div class="state-pill">
          <span id="modeState">人形待机</span>
          <strong id="modeName">Robot Form</strong>
        </div>
      </header>

      <section class="hud readout" aria-label="变形状态">
        <div>
          <span>变形</span>
          <strong id="transformValue">0%</strong>
        </div>
        <div>
          <span>车身闭合</span>
          <strong id="lockValue">0%</strong>
        </div>
        <div>
          <span>关节展开</span>
          <strong id="jointValue">100%</strong>
        </div>
        <div>
          <span>轮组对齐</span>
          <strong id="wheelValue">0%</strong>
        </div>
        <div>
          <span>结构展开</span>
          <strong id="explodeValue">0%</strong>
        </div>
      </section>

      <section class="hud notes-panel" aria-label="设计说明">
        <nav class="tabs" aria-label="说明分类">
          <button type="button" class="tab active" data-tab="structure">结构</button>
          <button type="button" class="tab" data-tab="motion">变形</button>
          <button type="button" class="tab" data-tab="detail">细节</button>
          <button type="button" class="tab" data-tab="limits">说明</button>
        </nav>
        <div class="notes-copy" id="notesCopy"></div>
      </section>

      <section class="hud transform-panel" aria-label="变形进度">
        <label>
          <span>人形</span>
          <input id="stageSlider" type="range" min="0" max="100" value="0" />
          <span>载具</span>
        </label>
      </section>

      <footer class="hud control-bar">
        <button type="button" id="robotBtn" title="切换到人形">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 3a3 3 0 0 1 3 3v2h2l2 4-3 2v7h-3v-6h-2v6H8v-7l-3-2 2-4h2V6a3 3 0 0 1 3-3Z" />
            <path d="M10 8h4" />
          </svg>
          <span>人形</span>
        </button>
        <button type="button" id="vehicleBtn" title="切换到载具">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 14h2l2-5h9l4 5h1v4h-2" />
            <path d="M7 18H5" />
            <path d="M17 18H9" />
            <circle cx="7" cy="18" r="2" />
            <circle cx="17" cy="18" r="2" />
          </svg>
          <span>载具</span>
        </button>
        <button type="button" id="playBtn" class="active" title="自动变形">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M8 5v14l11-7Z" />
          </svg>
          <span>自动演示</span>
        </button>
        <button type="button" id="explodeBtn" title="结构展开">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 3v6" />
            <path d="M12 15v6" />
            <path d="M3 12h6" />
            <path d="M15 12h6" />
            <path d="m7 7 3 3" />
            <path d="m14 14 3 3" />
            <path d="m17 7-3 3" />
            <path d="m10 14-3 3" />
          </svg>
          <span>展开结构</span>
        </button>
        <button type="button" id="rotateBtn" class="active" title="自动旋转">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 12a8 8 0 0 1 13.6-5.7" />
            <path d="M18 3v5h-5" />
            <path d="M20 12a8 8 0 0 1-13.6 5.7" />
            <path d="M6 21v-5h5" />
          </svg>
          <span>旋转</span>
        </button>
      </footer>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
