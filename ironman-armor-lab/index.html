<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>钢铁侠机甲实验室</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23110d0b'/%3E%3Ccircle cx='32' cy='32' r='13' fill='%236ee7ff'/%3E%3Cpath d='M18 12h28l6 13-20 27L12 25z' fill='none' stroke='%23d8432e' stroke-width='5' stroke-linejoin='round'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app">
      <canvas id="scene" aria-label="钢铁侠机甲 3D 演示"></canvas>

      <header class="hud top-hud">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <div>
            <h1>钢铁侠机甲实验室</h1>
            <p>人体穿戴式薄层装甲拆装</p>
          </div>
        </div>
        <div class="state-pill">
          <span id="armorState">已组装</span>
          <strong id="modeName">Wearable Shell</strong>
        </div>
      </header>

      <section class="hud readout" aria-label="机甲状态">
        <div>
          <span>护甲</span>
          <strong id="assemblyValue">100%</strong>
        </div>
        <div>
          <span>人体</span>
          <strong id="bodyValue">完整</strong>
        </div>
        <div>
          <span>拆开</span>
          <strong id="panelValue">0%</strong>
        </div>
        <div>
          <span>锁定</span>
          <strong id="lockValue">100%</strong>
        </div>
        <div>
          <span>推进</span>
          <strong id="thrustValue">0%</strong>
        </div>
      </section>

      <section class="hud system-panel" aria-label="拆装设计说明">
        <nav class="tabs" aria-label="拆装分类">
          <button type="button" class="tab active" data-tab="logic">拆装逻辑</button>
          <button type="button" class="tab" data-tab="body">人体内层</button>
          <button type="button" class="tab" data-tab="panels">机构轴承</button>
          <button type="button" class="tab" data-tab="making">制作顺序</button>
        </nav>
        <div class="engineering-copy" id="engineeringCopy"></div>
      </section>

      <section class="hud propulsion-panel" id="propulsionPanel" aria-label="推进姿态控制">
        <div class="panel-title">
          <span>推进姿态</span>
          <strong id="flightState">待机</strong>
        </div>
        <label>
          <span>推力</span>
          <input id="powerSlider" type="range" min="30" max="100" value="72" />
          <strong id="powerReadout">72%</strong>
        </label>
        <label>
          <span>俯仰</span>
          <input id="pitchSlider" type="range" min="-32" max="32" value="-12" />
          <strong id="pitchReadout">-12°</strong>
        </label>
        <label>
          <span>横滚</span>
          <input id="rollSlider" type="range" min="-32" max="32" value="0" />
          <strong id="rollReadout">0°</strong>
        </label>
        <button type="button" id="resetPoseBtn" title="重置姿态">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 12a8 8 0 0 1 13.6-5.7" />
            <path d="M18 3v5h-5" />
            <path d="M20 12a8 8 0 0 1-13.6 5.7" />
            <path d="M6 21v-5h5" />
          </svg>
          <span>重置姿态</span>
        </button>
      </section>

      <footer class="hud control-bar">
        <button type="button" id="disassembleBtn" title="自动拆卸">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 12h16" />
            <path d="M8 8 4 12l4 4" />
            <path d="m16 8 4 4-4 4" />
          </svg>
          <span>自动拆卸</span>
        </button>
        <button type="button" id="assembleBtn" title="自动安装">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M6 12h12" />
            <path d="m10 8-4 4 4 4" />
            <path d="m14 8 4 4-4 4" />
          </svg>
          <span>自动安装</span>
        </button>
        <button type="button" id="helmetBtn" title="面罩开合">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M8 4h8l3 5v7l-4 4H9l-4-4V9z" />
            <path d="M8 11h8" />
            <path d="M9 15h6" />
          </svg>
          <span>面罩</span>
        </button>
        <button type="button" id="boostBtn" title="推进模式">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 3 8 12h4l-2 9 6-11h-4z" />
            <path d="M5 21c1-3 2-4 4-5" />
            <path d="M19 21c-1-3-2-4-4-5" />
          </svg>
          <span>推进</span>
        </button>
        <button type="button" id="bodyBtn" title="只看人体">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 4a3 3 0 1 0 0 6 3 3 0 0 0 0-6Z" />
            <path d="M6 21v-4a6 6 0 0 1 12 0v4" />
            <path d="M8 13h8" />
          </svg>
          <span>人体</span>
        </button>
        <button type="button" id="rotateBtn" class="active" title="自动旋转">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 12a8 8 0 0 1 13.6-5.7" />
            <path d="M18 3v5h-5" />
            <path d="M20 12a8 8 0 0 1-13.6 5.7" />
            <path d="M6 21v-5h5" />
          </svg>
          <span>旋转</span>
        </button>
      </footer>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
